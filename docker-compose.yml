services:
    dittobot:
        build:
            context: .
            target: production
        user: "1000:1000"
        restart: unless-stopped
        ports:
            - "3000:3000"
        env_file:
            - .env
        volumes:
            - ./data:/app/data
        tmpfs:
            - /tmp
        read_only: true
        cap_drop:
            - ALL
        security_opt:
            - no-new-privileges:true
