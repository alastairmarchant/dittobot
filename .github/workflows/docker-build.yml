name: Docker Build

on:
    pull_request:
        branches:
            - main
    push:
        branches:
            - main

permissions:
    contents: read

jobs:
    build:
        name: Build Dockerfile (${{ matrix.target }})
        runs-on: ubuntu-latest

        strategy:
            matrix:
                target: [development, production]

        steps:
            - name: Checkout
              id: checkout
              uses: actions/checkout@v7

            - name: Set up Docker Buildx
              id: setup-buildx
              uses: docker/setup-buildx-action@v4

            - name: Build Docker image
              id: docker-build
              uses: docker/build-push-action@v7
              with:
                  context: .
                  target: ${{ matrix.target }}
                  push: false
